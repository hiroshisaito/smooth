# Phase 2-A.2 Step 3: backfill manifest for the v1.4.0-ae2025 goldens.
#
# Schema is documented in docs/PHASE_2A_GPU_RFC.md §3.2.6. Format is TOML
# (parseable from Python 3.11+ via stdlib `tomllib`).
#
# The .raw fixture files referenced below are NOT committed to git
# (.gitignore keeps them out — see RFC §3.2.5 sizing rationale). Use
# tests/fetch_goldens.sh to populate this directory or to verify SHA256
# of locally-staged files. The artifact_url field is empty until Step 4
# uploads tar.zst to a GitHub Release; until then, fetch_goldens.sh runs
# only the integrity-check half of its job.

schema_version = 1

[suite]
name = "v1.4.0-ae2025"
description = "smooth-mod v1.4.0 8/16bpc reference goldens captured on Mac AE 2025."
capture_source_platform = "macOS / AE 2025 (25.6_61 SDK)"
capture_date = "2026-04-21"
smooth_version = "1.4.0"
ae_version = "25.6"
sdk_version = "25.6_61"
artifact_url = ""      # Step 4 fills this with the GitHub Release asset URL.
artifact_sha256 = ""   # Step 4 fills this with the tar.zst SHA256.

# Mac CPU reference: bit-identical except where overridden per-frame.
[suite.mac_reference_policy]
kind = "identical"

# Mac <-> Win cross-platform tolerance for 8/16bpc integer domain.
# This policy mirrors the historical hardcoded rule in regression_test.cpp
# (`diff < 0.01% && max_abs <= 32`). Step 4+ harness will read this from
# the manifest instead of hardcoding it.
[suite.cross_platform_policy]
kind = "near-id"
metric = "byte_abs"
max_abs = 32
max_diff_pct = 0.01

