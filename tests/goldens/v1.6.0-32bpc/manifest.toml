# Phase 2-A.2 Step 4b: synthetic 32bpc goldens.
#
# Generated by tests/synthesize_32bpc_goldens.sh from the
# tests/goldens/v1.4.0-ae2025/ inputs (8/16bpc) by promoting
# pixels to f32 and running smooth_core::process<PF_PixelFloat>
# directly. The CPU 32bpc implementation IS the reference per
# docs/PHASE_2A_GPU_RFC.md §3.2.6, so the regression check is
# really "does the algorithm stay deterministic across builds
# and platforms?" — not "does it match an independent oracle?".
# That ground truth was already established in Phase 1 (8/16bpc
# vs AE-driven goldens) and 2-A.2 Step 1 (overbright/NaN unit
# tests). To re-generate, run tests/synthesize_32bpc_goldens.sh.

schema_version = 1

[suite]
name = "v1.6.0-32bpc"
description = "Synthetic 32bpc goldens derived from v1.4.0-ae2025 inputs."
capture_source_platform = "synthesize_32bpc_goldens.sh (smooth_core CPU 32bpc)"
capture_date = "2026-05-03"
smooth_version = "1.5.0-dev (Phase 2-A.2 Step 4b)"
ae_version = "n/a (no AE round trip)"
sdk_version = "25.6_61"
artifact_url = ""
artifact_sha256 = ""

[suite.mac_reference_policy]
# Mac CPU bit-identical: the reference IS the algorithm, so a
# difference here means smooth_core regressed or rayon
# scheduling drifted in a way that survives strip-parallel
# stability assumptions. Either way, hard fail.
kind = "identical"

[suite.cross_platform_policy]
# Mac vs Win f32 rounding can differ in the LSBs even for the
# same algorithm; 1e-5 absolute is generous (~14-bit precision
# in [0,1]) and matches the RFC §3.2.6 recommendation.
kind = "near-id"
metric = "f32_abs"
max_abs = 1e-5

